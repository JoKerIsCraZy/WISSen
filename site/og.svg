<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="meshA" cx="22%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshB" cx="82%" cy="78%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshC" cx="60%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmarkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Mesh gradients -->
  <rect width="1200" height="630" fill="url(#meshA)"/>
  <rect width="1200" height="630" fill="url(#meshB)"/>
  <rect width="1200" height="630" fill="url(#meshC)"/>

  <!-- Dot grid texture overlay -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Subtle accent line under wordmark -->
  <rect x="380" y="372" width="440" height="1" fill="url(#accentLine)"/>

  <!-- Top-right URL -->
  <text x="1140" y="56"
        font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="20"
        fill="#ffffff"
        fill-opacity="0.6"
        text-anchor="end">jokeriscrazy.github.io/wissen</text>

  <!-- Top-right small dot indicator -->
  <circle cx="1156" cy="50" r="4" fill="#a78bfa" fill-opacity="0.85"/>

  <!-- Centered wordmark -->
  <text x="600" y="335"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="138"
        font-weight="800"
        letter-spacing="-5"
        fill="url(#wordmarkGrad)"
        text-anchor="middle">WISSen</text>

  <!-- Tagline -->
  <text x="600" y="420"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="32"
        font-weight="500"
        letter-spacing="-0.5"
        fill="#ffffff"
        fill-opacity="0.55"
        text-anchor="middle">Deine WISS-Noten, live auf deinem Handy.</text>

  <!-- Bottom-left badge -->
  <g transform="translate(60, 560)">
    <rect x="0" y="0" width="356" height="34" rx="6"
          fill="#ffffff" fill-opacity="0.04"
          stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="18" cy="17" r="3.5" fill="#a78bfa"/>
    <text x="34" y="22"
          font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="14"
          fill="#ffffff"
          fill-opacity="0.7">v1.0.0 · self-hosted · MIT</text>
  </g>
</svg>

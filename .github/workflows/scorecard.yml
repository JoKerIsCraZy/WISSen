name: OpenSSF Scorecard

# Wöchentliche Bewertung der Repo-Security-Posture:
# Branch-Protection, Action-Pinning, Token-Permissions, SAST,
# Dangerous Workflows, Code-Review-Praxis, Maintained-Status.
#
# Ergebnis landet im Security-Tab (SARIF) + auf scorecard.dev wenn
# publish_results=true gesetzt ist (nur für public repos).

on:
  branch_protection_rule:
  schedule:
    # wöchentlich, Freitag 03:42 UTC
    - cron: '42 3 * * 5'
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Für Publish auf scorecard.dev
      id-token: write
      # Für SARIF-Upload zum Security-Tab
      security-events: write
      # Lese-Zugriff auf Actions/Contents für die Checks
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results=true ist nur für public repos sinnvoll
          # (Eintrag auf https://scorecard.dev). Auf false setzen
          # falls Repo private wird.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          sarif_file: results.sarif
          category: scorecard

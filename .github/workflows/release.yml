name: Release

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled, edited]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update_release_draft:
    name: Update release draft
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      # Drafter: erstellt/aktualisiert den Release-Draft auf main.
      # commitish explizit auf main, sonst nimmt v7 bei pull_request-Triggern
      # GITHUB_REF (refs/pull/N/merge) und die Releases-API antwortet 422.
      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7
        with:
          config-name: release-drafter.yml
          commitish: refs/heads/main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Autolabeler: ab v7 eine eigene Sub-Action. Ohne diesen Step werden
      # PRs nicht mehr automatisch nach Titel-Präfix gelabelt und fallen
      # damit aus den Changelog-Kategorien raus.
      # Läuft NUR auf PR-Events — auf push:main hätte er kein PR-Objekt
      # zum Labeln und würde mit "Event type is wrong" failen.
      - if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}
        uses: release-drafter/release-drafter/autolabeler@c2e2804cc59f45f57076a99af580d0fedb697927 # v7
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

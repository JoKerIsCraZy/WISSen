name: Trivy Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.trivyignore'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/trivy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.trivyignore'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    # wöchentlich, Dienstag 04:23 UTC (nach Dependabot Montag)
    - cron: '23 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dockerfile-scan:
    name: Trivy Dockerfile (misconfig)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          trivyignores: '.trivyignore'

      - name: Upload config SARIF to Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always()
        with:
          sarif_file: 'trivy-config.sarif'
          category: 'trivy-config'

  image-scan:
    name: Trivy Image (CVEs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Compute weekly APT_REFRESH key
        id: refresh
        run: echo "value=$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Build image (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: false
          load: true
          tags: wissen:trivy
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APT_REFRESH=${{ steps.refresh.outputs.value }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'wissen:trivy'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
          trivyignores: '.trivyignore'

      - name: Upload image SARIF to Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always()
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'

      - name: Summary for PR
        if: always()
        run: |
          echo "### Trivy Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "Siehe Security-Tab für detaillierte Findings." >> $GITHUB_STEP_SUMMARY

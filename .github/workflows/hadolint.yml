name: Hadolint

# Dockerfile-Linting (Best-Practices, NICHT Security — das macht Trivy).
# Findet z.B.:
#   - apt-get ohne --no-install-recommends
#   - latest-Tag in FROM
#   - mehrere RUNs die zu einem zusammengefasst werden sollten
#   - fehlende USER-Direktive (root läuft)
#   - COPY vor RUN apt-get (Cache-Buster)

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.hadolint.yaml'
      - '.github/workflows/hadolint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker/**'
      - '.hadolint.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hadolint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Hadolint Dockerfile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint.sarif
          # no-fail: lint-Findings sind WARNs, kein CI-Fail.
          # Auf "false" setzen wenn du PRs blockieren willst.
          no-fail: true
          # Severity-Threshold für CI-Failures (falls no-fail=false):
          # error / warning / info / style
          failure-threshold: error

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always()
        with:
          sarif_file: hadolint.sarif
          category: hadolint

      - name: Summary
        if: always()
        run: |
          echo "### Hadolint Dockerfile Lint" >> $GITHUB_STEP_SUMMARY
          echo "Findings siehe Security-Tab (Category: hadolint)." >> $GITHUB_STEP_SUMMARY

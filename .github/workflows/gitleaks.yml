name: Gitleaks Secret Scan

# Scannt Repo + Git-History nach hardcoded Secrets (Telegram-Token,
# MS-Passwort, API-Token, AES-Master-Key). Hochrelevant für dieses Projekt
# da .env-Secrets sehr ähnliche Patterns haben wie Test-/Demo-Werte im Code.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # wöchentlich, Mittwoch 05:11 UTC (nach CodeQL/Trivy)
    - cron: '11 5 * * 3'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout (full history für History-Scan)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE nur nötig für Organisationen — private/öffentliche
          # User-Repos brauchen den Key NICHT.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

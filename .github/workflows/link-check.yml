name: Markdown Link Check

# Scannt alle .md-Dateien (README, DOCKER.md, CONTRIBUTING.md, etc.)
# auf tote Links. Erstellt automatisch ein GitHub-Issue mit allen
# kaputten Links, oder updated das bestehende Issue.
#
# Ignoriert: lokale data/-Pfade, localhost-URLs, .env-Verweise.

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'
      - '.lycheeignore'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
  schedule:
    # wöchentlich, Samstag 02:19 UTC
    - cron: '19 2 * * 6'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Lychee link check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore lychee cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # --no-progress: kein TTY-Spam in CI
          # --cache: nutzt .lycheecache (Restored vor diesem Step)
          # --max-cache-age: Re-check nach 7 Tagen (Links können später kaputt gehen)
          # --accept: 200,206,429 (429 = Rate-Limit, nicht "tot")
          # --exclude: lokale Pfade + Cloudflare-blockierte Domains
          # --include-fragments: prüft auch Anchor-Links (#section)
          args: >-
            --no-progress
            --cache
            --max-cache-age 7d
            --accept 200,206,429
            --exclude-path data/
            --exclude-path node_modules/
            --exclude-path web-svelte/node_modules/
            --exclude-path dist/
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            --exclude '\.env'
            --exclude 'example\.com'
            --include-fragments
            './**/*.md'
          # Exit-Code 0 lassen — Issue wird trotzdem erstellt.
          # Auf 1 setzen wenn du PRs blockieren willst.
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create / update issue für broken links
        if: env.lychee_exit_code != '0' && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd # v5
        with:
          title: 'Broken Markdown links — wöchentlicher Lychee-Scan'
          content-filepath: ./lychee/out.md
          labels: |
            documentation
            broken-links

name: Zizmor (Workflow Audit)

# Auditiert .github/workflows/ selbst auf gefährliche Patterns:
#   - pull_request_target mit checkout von untrusted ref (Pwn Request)
#   - Expression-Injection in run:-Blocks (z.B. ${{ github.event.issue.title }})
#   - Ungepinnte Actions (@v6 statt @<sha>)
#   - Tokens mit excessiven Permissions
#   - Self-hosted runner ohne ephemeral-Flag
#   - Cache-Poisoning-Vectors
#
# Speziell relevant für dieses Repo wegen `dependabot-auto-merge.yml`
# das pull_request_target + contents:write nutzt.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  schedule:
    # wöchentlich, Sonntag 03:33 UTC
    - cron: '33 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Zizmor audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup uv (fast Python installer)
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        # enable-cache deaktiviert: dieses Repo hat keine uv.lock,
        # `enable-cache: true` failed sonst mit "No file matched to [**/uv.lock]"

      - name: Run zizmor
        run: |
          uvx zizmor@latest \
            --format sarif \
            --persona regular \
            .github/workflows/ \
            > zizmor.sarif
        env:
          # Für Online-Audits (Impostor-Commit-Detection, ref-confusion)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always()
        with:
          sarif_file: zizmor.sarif
          category: zizmor

      - name: Summary
        if: always()
        run: |
          echo "### Zizmor Workflow Audit" >> $GITHUB_STEP_SUMMARY
          echo "Findings siehe Security-Tab (Category: zizmor)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Persona: \`regular\` (audit-only Standard-Findings)" >> $GITHUB_STEP_SUMMARY
          echo "Für strengeres Audit: persona \`pedantic\` oder \`auditor\` setzen." >> $GITHUB_STEP_SUMMARY
